<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fried Liver Arcade | 3-in-1 Suite</title>
    <style>
        :root {
            --primary: #f39c12;
            --bg: #1a1a1a;
            --container: #333;
        }
        body { background: var(--bg); margin: 0; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; }
        
        /* Navigation */
        nav { background: #000; width: 100%; padding: 15px 0; display: flex; justify-content: center; gap: 20px; border-bottom: 3px solid var(--primary); }
        nav button { background: none; border: 2px solid var(--primary); color: var(--primary); padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        nav button:hover, nav button.active { background: var(--primary); color: #000; }

        /* Game Layout */
        .game-wrapper { margin-top: 30px; display: flex; flex-direction: column; align-items: center; width: 350px; }
        .game-container { background: var(--container); padding: 15px; border: 3px solid var(--primary); border-radius: 12px; text-align: center; width: 100%; box-shadow: 0 0 20px rgba(243, 156, 18, 0.3); }
        
        canvas { background: #000; display: block; margin: 10px auto; border: 2px solid #444; width: 100%; max-width: 300px; height: auto; }
        
        .ui-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        input { background: #222; border: 1px solid var(--primary); color: #fff; font-size: 11px; width: 80px; padding: 4px; border-radius: 4px; }
        
        /* Leaderboard */
        .leaderboard { margin-top: 15px; background: #000; border: 1px solid var(--primary); padding: 10px; border-radius: 8px; text-align: left; width: 100%; box-sizing: border-box; }
        .leaderboard strong { color: var(--primary); font-size: 12px; display: block; text-align: center; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        ol { margin: 0; padding-left: 25px; font-size: 11px; max-height: 120px; overflow-y: auto; }
        li { margin-bottom: 4px; }
        
        #overlay { position: absolute; width: 300px; height: 200px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 5; cursor: pointer; color: var(--primary); font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav>
    <button onclick="switchGame('breakout')" id="btn-breakout" class="active">ATARI</button>
    <button onclick="switchGame('pacman')" id="btn-pacman">PAC-MAN</button>
    <button onclick="switchGame('galaga')" id="btn-galaga">GALAGA</button>
</nav>

<div class="game-wrapper">
    <div class="game-container">
        <h2 id="game-title">ATARI BREAKOUT</h2>
        <div class="ui-row">
            <input type="text" id="playerName" placeholder="Enter Name" maxlength="10">
            <div id="score-display">PTS: 0</div>
        </div>
        
        <div style="position: relative;">
            <div id="overlay" onclick="initGame()">CLICK TO START</div>
            <canvas id="gameCanvas" width="300" height="200"></canvas>
        </div>

        <div class="leaderboard">
            <strong>🏆 TOP 10 HALL OF FAME</strong>
            <ol id="highScoresList"></ol>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let currentGame = 'breakout';
    let score = 0;
    let gameActive = false;
    let loop;

    // Game Objects
    let player = { x: 125, y: 180, w: 50, h: 10 };
    let ball = { x: 150, y: 150, dx: 2, dy: -2, r: 5 };
    let items = []; // Bricks, dots, or enemies

    function switchGame(game) {
        currentGame = game;
        gameActive = false;
        cancelAnimationFrame(loop);
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${game}`).classList.add('active');
        document.getElementById('game-title').innerText = game.toUpperCase();
        document.getElementById('overlay').classList.remove('hidden');
        renderLeaderboard();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function initGame() {
        document.getElementById('overlay').classList.add('hidden');
        score = 0;
        gameActive = true;
        
        if(currentGame === 'breakout') {
            player = { x: 125, y: 185, w: 50, h: 8 };
            ball = { x: 150, y: 170, dx: 2, dy: -2, r: 5 };
            items = [];
            for(let c=0; c<5; c++) for(let r=0; r<3; r++) items.push({x: 10+c*60, y: 30+r*20, w: 50, h: 15, status: 1});
        } else if(currentGame === 'pacman') {
            player = { x: 150, y: 150, r: 8, dir: 0 };
            items = [];
            for(let i=0; i<20; i++) items.push({x: Math.random()*280, y: Math.random()*180, r: 2});
        } else if(currentGame === 'galaga') {
            player = { x: 140, y: 175, w: 20, h: 15 };
            items = []; // Enemies
            for(let i=0; i<6; i++) items.push({x: 20+i*45, y: 20, w: 20, h: 15, speed: 1});
        }
        
        gameLoop();
    }

    function gameLoop() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if(currentGame === 'breakout') {
            // Ball Logic
            ball.x += ball.dx; ball.y += ball.dy;
            if(ball.x > 295 || ball.x < 5) ball.dx *= -1;
            if(ball.y < 5) ball.dy *= -1;
            if(ball.y > 180 && ball.x > player.x && ball.x < player.x + player.w) ball.dy *= -1;
            if(ball.y > 200) gameOver();

            // Bricks
            items.forEach(b => {
                if(b.status === 1) {
                    ctx.fillStyle = "#f39c12";
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    if(ball.x > b.x && ball.x < b.x+b.w && ball.y > b.y && ball.y < b.y+b.h) {
                        b.status = 0; ball.dy *= -1; score += 10;
                    }
                }
            });
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        } 
        
        else if(currentGame === 'pacman') {
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0.2*Math.PI, 1.8*Math.PI); ctx.lineTo(player.x, player.y); ctx.fill();
            items.forEach((d, i) => {
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, 7); ctx.fill();
                if(Math.hypot(player.x - d.x, player.y - d.y) < 10) { items.splice(i, 1); score += 10; }
            });
            if(items.length === 0) gameOver();
        }

        else if(currentGame === 'galaga') {
            ctx.fillStyle = "#3498db"; ctx.fillRect(player.x, player.y, player.w, player.h);
            items.forEach(en => {
                en.y += en.speed; ctx.fillStyle = "red"; ctx.fillRect(en.x, en.y, en.w, en.h);
                if(en.y > 200) gameOver();
            });
        }

        // Draw Player (Breakout/Galaga)
        if(currentGame !== 'pacman') {
            ctx.fillStyle = "#f39c12"; ctx.fillRect(player.x, player.y, player.w, player.h);
        }

        document.getElementById('score-display').innerText = "PTS: " + score;
        loop = requestAnimationFrame(gameLoop);
    }

    // Input Handling
    window.addEventListener("keydown", e => {
        if(e.key === "ArrowLeft" && player.x > 0) player.x -= 20;
        if(e.key === "ArrowRight" && player.x < 250) player.x += 20;
        if(currentGame === 'pacman') {
            if(e.key === "ArrowUp") player.y -= 10;
            if(e.key === "ArrowDown") player.y += 10;
        }
    });

    function gameOver() {
        gameActive = false;
        const name = document.getElementById('playerName').value || "GOAT";
        const storageKey = `scores_${currentGame}`;
        let scores = JSON.parse(localStorage.getItem(storageKey)) || [];
        scores.push({name, val: score});
        scores.sort((a,b) => b.val - a.val);
        localStorage.setItem(storageKey, JSON.stringify(scores.slice(0, 10)));
        document.getElementById('overlay').classList.remove('hidden');
        renderLeaderboard();
    }

    function renderLeaderboard() {
        const storageKey = `scores_${currentGame}`;
        const scores = JSON.parse(localStorage.getItem(storageKey)) || [];
        document.getElementById('highScoresList').innerHTML = scores.map((s, i) => `<li>${i===0?'👑 ':''}${s.name}: ${s.val}</li>`).join("");
    }

    renderLeaderboard();
</script>

</body>
</html>
