<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; margin: 0; display: flex; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-y: auto; padding: 20px; }
        .game-container {
            background: #333 !important; 
            padding: 15px;
            border: 3px solid #f39c12; 
            border-radius: 12px;
            text-align: center;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: #f39c12; margin: 5px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Instructions Section */
        .instructions {
            background: #222;
            color: #ccc;
            font-size: 11px;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-align: left;
            border-left: 3px solid #f39c12;
        }
        .instructions b { color: #f39c12; }

        canvas { 
            background: #000 !important; 
            display: block; 
            margin: 10px auto; 
            border: 2px solid #444;
            width: 250px; 
            height: 165px;
            image-rendering: pixelated;
        }

        .ui-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        input { background: #222; border: 1px solid #f39c12; color: #fff; font-size: 11px; width: 80px; padding: 4px; border-radius: 4px; }
        .score-text { color: #fff; font-size: 13px; font-weight: bold; }
        
        .leaderboard { 
            margin-top: 10px; 
            background: #000; 
            border: 1px solid #f39c12;
            padding: 8px; 
            border-radius: 6px; 
            text-align: left; 
        }
        .leaderboard strong { color: #f39c12; font-size: 11px; display: block; text-align: center; margin-bottom: 4px; }
        ol { margin: 0; color: #fff; padding-left: 20px; font-size: 12px; }
        li { color: #fff; margin-bottom: 3px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>Fried Liver Arcade</h2>
        
        <div class="instructions">
            <b>CONTROLS:</b> Use <b>← / →</b> Arrows to move.<br>
            <b>INFINITE MODE:</b> Clearing all bricks spawns a new wave and increases ball speed!
        </div>

        <div class="ui-row">
            <input type="text" id="playerName" placeholder="Enter Name..." maxlength="10">
            <div class="score-text">Score: <span id="currentScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="480" height="320"></canvas>

        <div class="leaderboard">
            <strong>🏆 HALL OF FAME</strong>
            <ol id="highScoresList"><li>No scores yet...</li></ol>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const nameInput = document.getElementById("playerName");
    const scoreDisplay = document.getElementById("currentScore");
    
    let score = 0;
    let highScores = JSON.parse(localStorage.getItem('fls_scores')) || [];

    // Ball properties
    let x = canvas.width / 2;
    let y = canvas.height - 30;
    let baseSpeed = 2.8;
    let dx = baseSpeed; 
    let dy = -baseSpeed; 
    const ballRadius = 10;

    // Paddle properties
    const paddleHeight = 15;
    const paddleWidth = 100;
    let paddleX = (canvas.width - paddleWidth) / 2;
    let rightPressed = false; 
    let leftPressed = false;

    // Brick properties
    const brickRowCount = 3;
    const brickColumnCount = 6;
    const brickWidth = 60;
    const brickHeight = 30;
    const brickPadding = 12;
    const brickOffsetTop = 40;
    const brickOffsetLeft = 35; 
    let bricks = [];

    function initBricks() {
        for(let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for(let r = 0; r < brickRowCount; r++) { 
                bricks[c][r] = { x: 0, y: 0, status: 1 }; 
            }
        }
    }

    // Input listeners
    document.addEventListener("keydown", (e) => {
        if(e.key == "Right" || e.key == "ArrowRight") rightPressed = true;
        if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = true;
    });
    document.addEventListener("keyup", (e) => {
        if(e.key == "Right" || e.key == "ArrowRight") rightPressed = false;
        if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = false;
    });

    function renderLeaderboard() {
        const list = document.getElementById("highScoresList");
        list.innerHTML = highScores.length > 0 
            ? highScores.map(s => `<li>${s.name}: ${s.val}</li>`).join("")
            : "<li>Play a game!</li>";
    }

    function resetGame() {
        const name = nameInput.value.trim() || "Guest";
        if(score > 0) {
            highScores.push({ name: name, val: score });
            highScores.sort((a, b) => b.val - a.val);
            highScores = highScores.slice(0, 3);
            localStorage.setItem('fls_scores', JSON.stringify(highScores));
            renderLeaderboard();
        }
        
        // Reset Stats
        score = 0;
        scoreDisplay.innerText = score;
        x = canvas.width / 2; 
        y = canvas.height - 30;
        dx = baseSpeed; 
        dy = -baseSpeed;
        paddleX = (canvas.width - paddleWidth) / 2;
        initBricks();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let activeBricks = 0;

        // Brick Logic
        bricks.forEach((col, c) => col.forEach((b, r) => {
            if(b.status == 1) {
                activeBricks++;
                let bx = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let by = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                b.x = bx; b.y = by;
                
                ctx.beginPath();
                ctx.rect(bx, by, brickWidth, brickHeight);
                ctx.fillStyle = "#f39c12";
                ctx.fill();
                ctx.closePath();

                // Collision detection
                if(x > bx && x < bx + brickWidth && y > by && y < by + brickHeight) {
                    dy = -dy; 
                    b.status = 0; 
                    score += 10;
                    scoreDisplay.innerText = score;
                }
            }
        }));

        // Infinite Spawn Logic
        if(activeBricks === 0) {
            initBricks();
            // Difficulty ramp: Increase speed by 15% each wave
            dx *= 1.15;
            dy *= 1.15;
        }

        // Ball Drawing
        ctx.beginPath(); 
        ctx.arc(x, y, ballRadius, 0, Math.PI*2);
        ctx.fillStyle = "#fff"; 
        ctx.fill(); 
        ctx.closePath();

        // Paddle Drawing
        ctx.beginPath(); 
        ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
        ctx.fillStyle = "#f39c12"; 
        ctx.fill(); 
        ctx.closePath();
        
        // Wall & Paddle Collisions
        if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
        if(y + dy < ballRadius) dy = -dy;
        else if(y + dy > canvas.height - ballRadius) {
            if(x > paddleX && x < paddleX + paddleWidth) {
                dy = -dy;
            } else {
                resetGame();
            }
        }

        // Paddle Controls
        if(rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 8;
        else if(leftPressed && paddleX > 0) paddleX -= 8;
        
        x += dx; 
        y += dy;
        requestAnimationFrame(draw);
    }

    initBricks();
    renderLeaderboard();
    draw();
</script>
</body>
</html>
