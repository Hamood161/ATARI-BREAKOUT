<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; margin: 0; display: flex; justify-content: center; font-family: sans-serif; overflow: hidden; }
        .game-container {
            background: #333;
            padding: 8px;
            border: 3px solid #f39c12; 
            border-radius: 10px;
            text-align: center;
            width: 250px;
        }
        h2 { color: #f39c12; margin: 2px 0; font-size: 14px; text-transform: uppercase; }
        canvas { 
            background: #000; 
            display: block; 
            margin: 5px auto; 
            border: 1px solid #555;
            width: 230px; 
            height: 150px;
        }
        .ui-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        input { background: #222; border: 1px solid #f39c12; color: #fff; font-size: 10px; width: 65px; padding: 2px; }
        .score-text { color: #fff; font-size: 11px; font-weight: bold; }
        
        /* FIX FOR INVISIBLE NAMES */
        .leaderboard { 
            margin-top: 5px; 
            color: #f39c12; 
            background: #000; 
            padding: 5px; 
            border-radius: 5px; 
            text-align: left; 
        }
        .leaderboard strong { font-size: 10px; display: block; text-align: center; margin-bottom: 3px; }
        ol { margin: 0; color: #ffffff !important; padding-left: 20px; font-size: 11px; }
        li { color: #ffffff !important; list-style: decimal; }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>Fried Liver Arcade</h2>
        <div class="ui-row">
            <input type="text" id="playerName" placeholder="Name..." maxlength="10">
            <div class="score-text">Score: <span id="currentScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="480" height="320"></canvas>
        <div class="leaderboard">
            <strong>🏆 HALL OF FAME</strong>
            <ol id="highScoresList"><li>No scores yet...</li></ol>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const nameInput = document.getElementById("playerName");
    let score = 0;
    let highScores = JSON.parse(localStorage.getItem('fls_scores')) || [];

    let x = canvas.width / 2;
    let y = canvas.height - 30;
    let dx = 4; let dy = -4;
    const ballRadius = 10;
    const paddleHeight = 15;
    const paddleWidth = 100;
    let paddleX = (canvas.width - paddleWidth) / 2;
    let rightPressed = false; let leftPressed = false;

    const brickRowCount = 3;
    const brickColumnCount = 6;
    const brickSize = 50; 
    const brickPadding = 15;
    const brickOffsetTop = 40;
    const brickOffsetLeft = 50; 
    let bricks = [];

    function initBricks() {
        for(let c=0; c<brickColumnCount; c++) {
            bricks[c] = [];
            for(let r=0; r<brickRowCount; r++) { bricks[c][r] = { x: 0, y: 0, status: 1 }; }
        }
    }

    document.addEventListener("keydown", (e) => {
        if(e.key == "Right" || e.key == "ArrowRight") rightPressed = true;
        if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = true;
    });
    document.addEventListener("keyup", (e) => {
        if(e.key == "Right" || e.key == "ArrowRight") rightPressed = false;
        if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = false;
    });

    function renderLeaderboard() {
        const list = document.getElementById("highScoresList");
        list.innerHTML = highScores.length > 0 
            ? highScores.map(s => `<li>${s.name}: ${s.val}</li>`).join("")
            : "<li>Play to be first!</li>";
    }

    function resetGame() {
        const name = nameInput.value.trim() || "Anonymous";
        if(score > 0) {
            highScores.push({ name: name, val: score });
            highScores.sort((a, b) => b.val - a.val);
            highScores = highScores.slice(0, 3);
            localStorage.setItem('fls_scores', JSON.stringify(highScores));
            renderLeaderboard();
        }
        score = 0;
        document.getElementById("currentScore").innerText = score;
        x = canvas.width / 2; y = canvas.height - 30;
        dx = 4; dy = -4;
        paddleX = (canvas.width - paddleWidth) / 2;
        initBricks();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        bricks.forEach((col, c) => col.forEach((b, r) => {
            if(b.status == 1) {
                let bx = (c*(brickSize+brickPadding))+brickOffsetLeft;
                let by = (r*(brickSize+brickPadding))+brickOffsetTop;
                b.x = bx; b.y = by;
                ctx.beginPath();
                ctx.rect(bx, by, brickSize, brickSize);
                ctx.fillStyle = "#f39c12";
                ctx.fill();
                ctx.closePath();
                if(x > bx && x < bx+brickSize && y > by && y < by+brickSize) {
                    dy = -dy; b.status = 0; score += 10;
                    document.getElementById("currentScore").innerText = score;
                }
            }
        }));
        ctx.beginPath(); ctx.arc(x, y, ballRadius, 0, Math.PI*2);
        ctx.fillStyle = "#fff"; ctx.fill(); ctx.closePath();
        ctx.beginPath(); ctx.rect(paddleX, canvas.height-paddleHeight, paddleWidth, paddleHeight);
        ctx.fillStyle = "#f39c12"; ctx.fill(); ctx.closePath();
        if(x + dx > canvas.width-ballRadius || x + dx < ballRadius) dx = -dx;
        if(y + dy < ballRadius) dy = -dy;
        else if(y + dy > canvas.height-ballRadius) {
            if(x > paddleX && x < paddleX + paddleWidth) dy = -dy;
            else resetGame();
        }
        if(rightPressed && paddleX < canvas.width-paddleWidth) paddleX += 8;
        else if(leftPressed && paddleX > 0) paddleX -= 8;
        x += dx; y += dy;
        requestAnimationFrame(draw);
    }

    initBricks();
    renderLeaderboard();
    draw();
</script>
</body>
</html>
