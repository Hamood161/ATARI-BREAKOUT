<!DOCTYPE html>
<html>
<head>
    <title>FLS Mini-Arcade</title>
    <style>
        body { 
            background: #1a1a1a; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            font-family: sans-serif;
            overflow: hidden;
        }
        .game-container {
            background: #333;
            padding: 8px;
            border: 3px solid #f39c12; 
            border-radius: 10px;
            text-align: center;
            width: 280px; /* Fits sidebar width */
        }
        h2 { color: #f39c12; margin: 2px 0; font-size: 16px; text-transform: uppercase; }
        canvas { 
            background: #000; 
            display: block; 
            margin: 5px auto; 
            border: 1px solid #555;
            width: 260px; /* Small canvas */
            height: 180px;
        }
        .ui-row { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        input { background: #222; border: 1px solid #f39c12; color: #fff; font-size: 10px; width: 70px; padding: 2px; }
        .score-text { color: #fff; font-size: 12px; font-weight: bold; }
        .leaderboard { margin-top: 8px; color: #f39c12; background: #222; padding: 5px; border-radius: 5px; text-align: left; font-size: 11px; }
        ol { margin: 3px 0; color: #fff; padding-left: 20px; }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>Fried Liver Arcade</h2>
        <div class="ui-row">
            <input type="text" id="playerName" placeholder="Name..." maxlength="10">
            <div class="score-text">Score: <span id="currentScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="480" height="320"></canvas>
        <div class="leaderboard">
            <strong style="display:block; text-align:center;">🏆 TOP 3 SCORES</strong>
            <ol id="highScoresList"><li>No legends yet...</li></ol>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const nameInput = document.getElementById("playerName");
    let score = 0;
    let highScores = JSON.parse(localStorage.getItem('fls_scores')) || [];

    let x = canvas.width / 2;
    let y = canvas.height - 30;
    let dx = 3; let dy = -3;
    const ballRadius = 10;
    const paddleHeight = 12;
    const paddleWidth = 90;
    let paddleX = (canvas.width - paddleWidth) / 2;
    let rightPressed = false; let leftPressed = false;

    const brickRowCount = 3; const brickColumnCount = 5;
    const brickWidth = 80; const brickHeight = 25;
    const brickPadding = 10; const brickOffsetTop = 35; const brickOffsetLeft = 18;
    let bricks = [];

    function initBricks() {
        for(let c=0; c<brickColumnCount; c++) {
            bricks[c] = [];
            for(let r=0; r<brickRowCount; r++) { bricks[c][r] = { x: 0, y: 0, status: 1 }; }
        }
    }

    document.addEventListener("keydown", (e) => {
        if(e.key == "Right" || e.key == "ArrowRight") rightPressed = true;
        if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = true;
    });
    document.addEventListener("keyup", (e) => {
        if(e.key == "Right" || e.key == "ArrowRight") rightPressed = false;
        if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = false;
    });

    function renderLeaderboard() {
        const list = document.getElementById("highScoresList");
        list.innerHTML = highScores.length > 0 
            ? highScores.map(s => `<li>${s.name}: ${s.val}</li>`).join("")
            : "<li>Play to be first!</li>";
    }

    function resetGame() {
        const name = nameInput.value.trim() || "Anonymous";
        if(score > 0) {
            highScores.push({ name: name, val: score });
            highScores.sort((a, b) => b.val - a.val);
            highScores = highScores.slice(0, 3);
            localStorage.setItem('fls_scores', JSON.stringify(highScores));
            renderLeaderboard();
        }
        score = 0;
        document.getElementById("currentScore").innerText = score;
        x = canvas.width / 2; y = canvas.height - 30;
        dx = 3; dy = -3;
        paddleX = (canvas.width - paddleWidth) / 2;
        initBricks();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        bricks.forEach((col, c) => col.forEach((b, r) => {
            if(b.status == 1) {
                let bx = (c*(brickWidth+brickPadding))+brickOffsetLeft;
                let by = (r*(brickHeight+brickPadding))+brickOffsetTop;
                b.x = bx; b.y = by;
                ctx.beginPath(); ctx.rect(bx, by, brickWidth, brickHeight);
                ctx.fillStyle = "#f39c12"; ctx.fill(); ctx.closePath();
                if(x > bx && x < bx+brickWidth && y > by && y < by+brickHeight) {
                    dy = -dy; b.status = 0; score += 10;
                    document.getElementById("currentScore").innerText = score;
                }
            }
        }));

        ctx.beginPath(); ctx.arc(x, y, ballRadius, 0, Math.PI*2);
        ctx.fillStyle = "#fff"; ctx.fill(); ctx.closePath();
        ctx.beginPath(); ctx.rect(paddleX, canvas.height-paddleHeight, paddleWidth, paddleHeight);
        ctx.fillStyle = "#f39c12"; ctx.fill(); ctx.closePath();

        if(x + dx > canvas.width-ballRadius || x + dx < ballRadius) dx = -dx;
        if(y + dy < ballRadius) dy = -dy;
        else if(y + dy > canvas.height-ballRadius) {
            if(x > paddleX && x < paddleX + paddleWidth) dy = -dy;
            else resetGame();
        }

        if(rightPressed && paddleX < canvas.width-paddleWidth) paddleX += 7;
        else if(leftPressed && paddleX > 0) paddleX -= 7;
        x += dx; y += dy;
        requestAnimationFrame(draw);
    }

    initBricks();
    renderLeaderboard();
    draw();
</script>
</body>
</html>
