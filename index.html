<style>
    body { 
        background: #1a1a1a; /* Dark background for contrast */
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
        font-family: Arial, sans-serif;
    }

    /* This is your "Box" */
    .game-container {
        background: #333;
        padding: 20px;
        border: 4px solid #f39c12; /* "Fried Liver" Orange */
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 10px #f39c12;
        text-align: center;
    }

    canvas { 
        background: #000; 
        display: block; 
        margin: 0 auto; 
        border: 2px solid #555;
    }

    h2 { color: #f39c12; margin-bottom: 10px; text-transform: uppercase; }
    p { color: #ccc; font-size: 12px; margin-top: 10px; }
</style>

<body>
    <div class="game-container">
        <h2>Fried Liver Arcade</h2>
        <canvas id="gameCanvas" width="480" height="320"></canvas>
        <p>Use Arrow Keys to Move</p>
    </div>

    </body>
